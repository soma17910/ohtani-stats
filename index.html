<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本人MLBスタッツトラッカー</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2a78d6">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="日本人MLB">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<style>
  :root {
    color-scheme: light;
    --page:           #f9f9f7;
    --surface-1:      #fcfcfb;
    --text-primary:   #0b0b0b;
    --text-secondary: #52514e;
    --text-muted:     #898781;
    --grid:           #e1e0d9;
    --baseline:       #c3c2b7;
    --border:         rgba(11,11,11,0.10);
    --series-1:       #2a78d6;
    --series-1-wash:  rgba(42,120,214,0.10);
    --good:           #006300;
    --live:           #d03b3b;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --page:           #0d0d0d;
      --surface-1:      #1a1a19;
      --text-primary:   #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted:     #898781;
      --grid:           #2c2c2a;
      --baseline:       #383835;
      --border:         rgba(255,255,255,0.10);
      --series-1:       #3987e5;
      --series-1-wash:  rgba(57,135,229,0.12);
      --good:           #0ca30c;
      --live:           #e66767;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif;
    background: var(--page);
    color: var(--text-primary);
    line-height: 1.5;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 16px 20px 56px; }

  /* 選手タブ */
  .tabs {
    display: flex; gap: 6px; overflow-x: auto; padding: 4px 0 12px;
    -webkit-overflow-scrolling: touch; scrollbar-width: thin;
  }
  .tabs::-webkit-scrollbar { height: 5px; }
  .tabs::-webkit-scrollbar-thumb { background: var(--baseline); border-radius: 3px; }
  .tab {
    flex: 0 0 auto; font: inherit; font-size: 13px; font-weight: 600;
    color: var(--text-secondary); background: var(--surface-1);
    border: 1px solid var(--border); border-radius: 999px;
    padding: 6px 14px; cursor: pointer; white-space: nowrap;
  }
  .tab:hover { border-color: var(--baseline); }
  .tab.active { color: #fff; background: var(--series-1); border-color: var(--series-1); }

  header { display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px 16px; margin-bottom: 6px; }
  header h1 { font-size: 26px; font-weight: 700; }
  .sub { color: var(--text-secondary); font-size: 14px; }
  .toolbar { display: flex; align-items: center; gap: 12px; margin: 10px 0 22px; flex-wrap: wrap; }
  .toolbar .stamp { color: var(--text-muted); font-size: 13px; }
  button.refresh {
    font: inherit; font-size: 13px; font-weight: 600;
    color: var(--text-primary); background: var(--surface-1);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 6px 14px; cursor: pointer;
  }
  button.refresh:hover { border-color: var(--baseline); }
  button.refresh:disabled { opacity: .5; cursor: default; }

  .card {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .card h2 { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
  .card h2 .en { color: var(--text-muted); font-weight: 500; font-size: 12px; margin-left: 8px; }

  /* game banner */
  #gameCard .matchup { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  #gameCard .score { font-size: 30px; font-weight: 600; }
  #gameCard .teams { font-size: 15px; color: var(--text-secondary); }
  .badge {
    display: inline-block; font-size: 12px; font-weight: 700;
    padding: 2px 10px; border-radius: 999px;
    border: 1px solid var(--border); color: var(--text-secondary);
  }
  .badge.live { color: var(--live); border-color: currentColor; }

  /* 試合中の打撃(リアルタイム) */
  #gameHitting { width: 100%; margin-top: 6px; }
  #gameHitting .line {
    font-size: 20px; font-weight: 600; margin-bottom: 8px;
    display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap;
  }
  #gameHitting .line .sum { font-size: 13px; font-weight: 500; color: var(--text-secondary); }
  #gameHitting .pas { display: flex; flex-wrap: wrap; gap: 6px; }
  .pa {
    font-size: 12px; padding: 3px 9px; border-radius: 999px;
    border: 1px solid var(--border); color: var(--text-secondary);
    display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
  }
  .pa .inn { color: var(--text-muted); font-variant-numeric: tabular-nums; }
  .pa.hit { border-color: var(--good); color: var(--good); font-weight: 600; }
  .pa.hr { background: var(--good); color: #fff; border-color: var(--good); font-weight: 700; }
  .pa.walk { border-color: var(--series-1); color: var(--series-1); }
  .pa.now {
    border-color: var(--live); color: var(--live); font-weight: 700;
    animation: paPulse 1.6s ease-in-out infinite;
  }
  @keyframes paPulse { 0%, 100% { opacity: 1; } 50% { opacity: .45; } }
  @media (prefers-reduced-motion: reduce) { .pa.now { animation: none; } }

  /* stat tiles */
  .tiles { display: grid; grid-template-columns: repeat(auto-fill, minmax(128px, 1fr)); gap: 10px; }
  .tile { padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px; }
  .tile .label { font-size: 12px; color: var(--text-muted); }
  .tile .value { font-size: 26px; font-weight: 600; letter-spacing: -0.01em; }
  .tile .hint { font-size: 11px; color: var(--text-muted); }

  /* 株価風の変動カラー(24時間で通常色に戻る) */
  .value.up { color: var(--good); }
  .value.down { color: var(--live); }
  .arrow { font-size: 0.45em; vertical-align: middle; margin-left: 3px; }
  .prev {
    font-size: 12px; font-weight: 500; color: var(--text-muted);
    margin-left: 6px; white-space: nowrap;
  }
  .hero .hint { font-size: 12px; color: var(--text-muted); }
  .hint.top { font-weight: 700; color: var(--text-secondary); }

  .hero { display: flex; gap: 28px; flex-wrap: wrap; margin-bottom: 16px; }
  .hero .value { font-size: 48px; font-weight: 600; line-height: 1.1; }
  .hero .label { font-size: 13px; color: var(--text-secondary); }

  /* chart */
  .chart-box { position: relative; }
  .chart-box svg { display: block; width: 100%; height: auto; }
  .tooltip {
    position: absolute; pointer-events: none; display: none;
    background: var(--surface-1); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 10px; font-size: 12px;
    color: var(--text-secondary); box-shadow: 0 2px 8px rgba(0,0,0,.12);
    white-space: nowrap; z-index: 5;
  }
  .tooltip b { color: var(--text-primary); }

  /* tables */
  .table-scroll { overflow-x: auto; }
  table { border-collapse: collapse; width: 100%; font-size: 13px; }
  th {
    text-align: right; font-weight: 600; color: var(--text-muted);
    padding: 6px 10px; border-bottom: 1px solid var(--baseline); white-space: nowrap;
  }
  th:first-child, td:first-child, th.l, td.l { text-align: left; }
  td {
    text-align: right; padding: 6px 10px;
    border-bottom: 1px solid var(--grid); white-space: nowrap;
    font-variant-numeric: tabular-nums; color: var(--text-primary);
  }
  td.dim { color: var(--text-secondary); }
  tr:last-child td { border-bottom: none; }

  /* standings */
  .standings { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 8px 24px; }
  .standings h3 { font-size: 12px; font-weight: 600; color: var(--text-muted); margin: 8px 0 4px; }
  .standings td.l { max-width: 110px; overflow: hidden; text-overflow: ellipsis; }
  tr.me td { background: var(--series-1-wash); font-weight: 600; }
  tr.cut td { border-bottom: 1px solid var(--baseline); }
  .lg-head { font-size: 14px; font-weight: 700; margin: 14px 0 2px; }
  .lg-head:first-child { margin-top: 4px; }
  #standSummary { font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; }
  #standSummary b { color: var(--text-primary); }

  .error {
    color: var(--live); font-size: 14px; padding: 12px 0;
  }
  .loading { color: var(--text-muted); font-size: 14px; }
  footer { color: var(--text-muted); font-size: 12px; margin-top: 8px; }
  footer a { color: inherit; }
</style>
</head>
<body>
<div class="wrap">
  <nav class="tabs" id="tabs" aria-label="選手切り替え"></nav>
  <header>
    <h1 id="playerName">大谷翔平</h1>
    <span class="sub" id="playerMeta">Shohei Ohtani</span>
  </header>
  <div class="toolbar">
    <button class="refresh" id="refreshBtn">↻ 今すぐ更新</button>
    <span class="stamp" id="stamp">読み込み中…</span>
    <span class="stamp">60秒ごとに自動更新</span>
  </div>

  <div class="card" id="gameCard" hidden>
    <h2>直近の試合<span class="en">GAME</span></h2>
    <div class="matchup" id="gameBody"></div>
    <div id="gameHitting" hidden></div>
  </div>

  <div class="card" id="hitCard">
    <h2 id="hitTitle">打撃成績<span class="en">HITTING</span></h2>
    <div class="hero" id="hitHero"></div>
    <div class="tiles" id="hitTiles"><span class="loading">読み込み中…</span></div>
  </div>

  <div class="card" id="pitCard">
    <h2 id="pitTitle">投手成績<span class="en">PITCHING</span></h2>
    <div class="hero" id="pitHero"></div>
    <div class="tiles" id="pitTiles"><span class="loading">読み込み中…</span></div>
  </div>

  <div class="card" id="standCard" hidden>
    <h2>順位表<span class="en">MLB STANDINGS</span></h2>
    <div id="standSummary"></div>
    <div id="standBody"></div>
  </div>

  <div class="card" id="chartCard">
    <h2 id="chartTitle">本塁打数の推移(累計)<span class="en">CUMULATIVE HR</span></h2>
    <div class="chart-box" id="cumChart"><span class="loading">読み込み中…</span></div>
  </div>

  <div class="card" id="hitLogCard">
    <h2>直近10試合(打撃)<span class="en">LAST 10 GAMES</span></h2>
    <div class="table-scroll" id="hitLog"><span class="loading">読み込み中…</span></div>
  </div>

  <div class="card" id="pitLogCard">
    <h2>直近5登板(投手)<span class="en">LAST 5 STARTS</span></h2>
    <div class="table-scroll" id="pitLog"><span class="loading">読み込み中…</span></div>
  </div>

  <footer>データ提供: <a href="https://statsapi.mlb.com" target="_blank" rel="noopener">MLB Stats API</a>(非公式利用)。表示は自動更新されます。</footer>
</div>

<script>
const API = "https://statsapi.mlb.com/api/v1";
const REFRESH_MS = 60_000;

// MLBの日本人選手(2026シーズン、出場実績あり)
// pos: TWP=二刀流 / P=投手 / それ以外=野手。lg は順位取得のフォールバック(通常は所属から自動判定)
const PLAYERS = [
  { id: 660271, jp: "大谷翔平",   en: "Shohei Ohtani",      pos: "TWP", lg: 104 },
  { id: 673548, jp: "鈴木誠也",   en: "Seiya Suzuki",       pos: "RF",  lg: 104 },
  { id: 672960, jp: "岡本和真",   en: "Kazuma Okamoto",     pos: "3B",  lg: 103 },
  { id: 807799, jp: "吉田正尚",   en: "Masataka Yoshida",   pos: "DH",  lg: 103 },
  { id: 808959, jp: "村上宗隆",   en: "Munetaka Murakami",  pos: "1B",  lg: 103 },
  { id: 807747, jp: null,         en: "Rikuu Nishida",      pos: "RF",  lg: 103 },
  { id: 808967, jp: "山本由伸",   en: "Yoshinobu Yamamoto", pos: "P",   lg: 104 },
  { id: 808963, jp: "佐々木朗希", en: "Roki Sasaki",        pos: "P",   lg: 104 },
  { id: 673540, jp: "千賀滉大",   en: "Kodai Senga",        pos: "P",   lg: 104 },
  { id: 684007, jp: "今永昇太",   en: "Shota Imanaga",      pos: "P",   lg: 104 },
  { id: 579328, jp: "菊池雄星",   en: "Yusei Kikuchi",      pos: "P",   lg: 103 },
  { id: 608372, jp: "菅野智之",   en: "Tomoyuki Sugano",    pos: "P",   lg: 104 },
  { id: 673513, jp: "松井裕樹",   en: "Yuki Matsui",        pos: "P",   lg: 104 },
  { id: 837227, jp: "今井達也",   en: "Tatsuya Imai",       pos: "P",   lg: 103 },
];
let activePlayer = PLAYERS[0];
let PLAYER_ID = activePlayer.id;
let currentRole = "bat"; // "bat" | "pit" | "two"

const $ = id => document.getElementById(id);
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

async function fetchJSON(url) {
  const res = await fetch(url, { cache: "no-store" });
  if (!res.ok) throw new Error(`HTTP ${res.status}: ${url}`);
  return res.json();
}

function fmtDateISO(d) {
  const p = n => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`;
}

// --- season resolution: use current year, fall back to previous if empty ---
async function resolveSeasonData() {
  const year = new Date().getFullYear();
  for (const season of [year, year - 1]) {
    const url = `${API}/people/${PLAYER_ID}?hydrate=stats(group=[hitting,pitching],type=[season],season=${season}),currentTeam`;
    const data = await fetchJSON(url);
    const person = data.people?.[0];
    const hasStats = person?.stats?.some(s => s.splits?.length);
    if (hasStats) return { season, person };
  }
  throw new Error("シーズン成績が取得できませんでした");
}

function splitStat(person, group) {
  const entry = person.stats?.find(s => s.group?.displayName === group);
  return entry?.splits?.[0]?.stat ?? null;
}

// --- 株価風の変動カラー(前日比方式) ---
// 直近24時間以内に行われた試合の成績を試合ログから逆算し、
// 「試合前の値」と現在値を比較して 上昇=緑▲ / 下降=赤▼ を付ける。
// 変動なし、または直近24時間に試合がない場合は通常色。
// 端末やブラウザに依存せず、どこで開いても同じ色になる。
const TREND_WINDOW_MS = 24 * 60 * 60 * 1000;
const sign = d => (d > 0 ? 1 : d < 0 ? -1 : 0);
// 表示桁数で丸めてから比較する(見た目が同じ数値は「変動なし」扱い)
const cmpAt = (cur, before, digits) => {
  const m = 10 ** digits;
  return sign(Math.round(cur * m) - Math.round(before * m));
};
// 投球回 "85.2" → アウト数 (85*3+2)
const ipToOuts = ip => {
  const [w, f] = String(ip ?? "0").split(".");
  return (Number(w) || 0) * 3 + (Number(f) || 0);
};

// tr = { d: 数値の増減方向(-1/0/1), p: 前回値の表示文字列, neg: 低いほど良い指標か }
// 矢印は数値の増減(▲=増/▼=減)を表し、色は「良い変化=緑 / 悪い変化=赤」を表す。
// 三振や防御率など低いほど良い指標(neg)では、増加=▲でも色は赤になる。
function trendMarkup(value, tr) {
  const d = tr?.d ?? 0;
  const colorDir = tr?.neg ? -d : d;
  const cls = colorDir > 0 ? " up" : colorDir < 0 ? " down" : "";
  const arrow = d > 0 ? '<span class="arrow">▲</span>' : d < 0 ? '<span class="arrow">▼</span>' : "";
  const prev = d !== 0 && tr?.p != null ? `<span class="prev">前回 ${esc(tr.p)}</span>` : "";
  return { cls, html: esc(value) + arrow + prev };
}
// リーグ順位の注記(1〜3位は少し強調)
function rankHint(rank) {
  if (!rank) return "";
  return `<div class="hint${rank <= 3 ? " top" : ""}">リーグ ${rank}位</div>`;
}
function tile(label, value, tr, rank) {
  const t = trendMarkup(value, tr);
  return `<div class="tile"><div class="label">${esc(label)}</div><div class="value${t.cls}">${t.html}</div>${rankHint(rank)}</div>`;
}
function heroFig(label, value, tr, rank) {
  const t = trendMarkup(value, tr);
  return `<div><div class="value${t.cls}">${t.html}</div><div class="label">${esc(label)}</div>${rankHint(rank)}</div>`;
}

// 直近24時間以内に開始された試合のログだけを抽出
function recentSplits(splits, timeByPk) {
  const now = Date.now();
  return splits.filter(s => {
    const t = timeByPk.get(s.game?.gamePk);
    if (t != null) return t <= now && now - t < TREND_WINDOW_MS;
    return s.date >= fmtDateISO(new Date(now - TREND_WINDOW_MS));
  });
}

// 率を ".293" 形式に整形
const fmt3 = x => x.toFixed(3).replace(/^0\./, ".");

function computeHitDirs(stat, splits, timeByPk) {
  if (!stat) return {};
  const rec = recentSplits(splits, timeByPk);
  if (!rec.length) return {};
  const S = f => rec.reduce((a, s) => a + (Number(s.stat[f]) || 0), 0);
  const n = v => Number(v) || 0;
  // カウント系: 前回値 = 現在値 - 直近試合分
  const cnt = f => ({ d: sign(S(f)), p: n(stat[f]) - S(f) });
  const bAB = n(stat.atBats) - S("atBats");
  const bH = n(stat.hits) - S("hits");
  const bBB = n(stat.baseOnBalls) - S("baseOnBalls");
  const bHBP = n(stat.hitByPitch) - S("hitByPitch");
  const bSF = n(stat.sacFlies) - S("sacFlies");
  const bTB = n(stat.totalBases) - S("totalBases");
  const rate = (num, den) => (den > 0 ? num / den : 0);
  const bAvg = rate(bH, bAB);
  const bObp = rate(bH + bBB + bHBP, bAB + bBB + bHBP + bSF);
  const bSlg = rate(bTB, bAB);
  // MLB公式のOPSは出塁率・長打率を3桁に丸めてから合算する
  const bOps = (Math.round(bObp * 1000) + Math.round(bSlg * 1000)) / 1000;
  return {
    hr: cnt("homeRuns"),
    rbi: cnt("rbi"),
    hits: cnt("hits"),
    runs: cnt("runs"),
    sb: cnt("stolenBases"),
    bb: cnt("baseOnBalls"),
    so: { ...cnt("strikeOuts"), neg: true },
    g: { d: sign(rec.length), p: n(stat.gamesPlayed) - rec.length },
    pa: cnt("plateAppearances"),
    avg: { d: cmpAt(parseFloat(stat.avg), bAvg, 3), p: fmt3(bAvg) },
    obp: { d: cmpAt(parseFloat(stat.obp), bObp, 3), p: fmt3(bObp) },
    slg: { d: cmpAt(parseFloat(stat.slg), bSlg, 3), p: fmt3(bSlg) },
    ops: { d: cmpAt(parseFloat(stat.ops), bOps, 3), p: fmt3(bOps) },
  };
}

function computePitDirs(stat, splits, timeByPk) {
  if (!stat) return {};
  const rec = recentSplits(splits, timeByPk);
  if (!rec.length) return {};
  const S = f => rec.reduce((a, s) => a + (Number(s.stat[f]) || 0), 0);
  const n = v => Number(v) || 0;
  const cnt = f => ({ d: sign(S(f)), p: n(stat[f]) - S(f) });
  const outsNow = ipToOuts(stat.inningsPitched);
  const bOuts = outsNow - rec.reduce((a, s) => a + ipToOuts(s.stat.inningsPitched), 0);
  const bER = n(stat.earnedRuns) - S("earnedRuns");
  const bH = n(stat.hits) - S("hits");
  const bBB = n(stat.baseOnBalls) - S("baseOnBalls");
  const bSO = n(stat.strikeOuts) - S("strikeOuts");
  const bAB = n(stat.atBats) - S("atBats");
  const bW = n(stat.wins) - S("wins");
  const bL = n(stat.losses) - S("losses");
  const rate = (num, den) => (den > 0 ? num / den : 0);
  const bEra = rate(27 * bER, bOuts);
  const bWhip = rate(bH + bBB, bOuts / 3);
  const bK9 = rate(27 * bSO, bOuts);
  const outsToIp = o => `${Math.floor(o / 3)}.${o % 3}`;
  return {
    era: { d: cmpAt(parseFloat(stat.era), bEra, 2), p: bEra.toFixed(2), neg: true },
    winloss: { d: S("wins") > 0 ? 1 : S("losses") > 0 ? -1 : 0, p: `${bW}勝${bL}敗` },
    so: cnt("strikeOuts"),
    ip: { d: sign(outsNow - bOuts), p: outsToIp(bOuts) },
    whip: { d: cmpAt(parseFloat(stat.whip), bWhip, 2), p: bWhip.toFixed(2), neg: true },
    k9: { d: cmpAt(parseFloat(stat.strikeoutsPer9Inn), bK9, 2), p: bK9.toFixed(2) },
    avg: { d: cmpAt(parseFloat(stat.avg), rate(bH, bAB), 3), p: fmt3(rate(bH, bAB)), neg: true },
    bb: { ...cnt("baseOnBalls"), neg: true },
    gs: cnt("gamesStarted"),
  };
}

function renderHitting(stat, season, dirs = {}, ranks = {}) {

// --- cumulative chart (single series, 2px line, hover tooltip) ---
// field: 集計するstatフィールド(homeRuns / strikeOuts など), unitJa: 単位(本 / 奪三振)
function renderCumChart(splits, field, unitJa) {
  const box = $("cumChart");
  if (!splits.length) { box.innerHTML = `<span class="loading">データなし</span>`; return; }
  const pts = [];
  let total = 0;
  splits.forEach((s, i) => { total += Number(s.stat[field]) || 0; pts.push({ g: i + 1, v: total, date: s.date }); });

  const W = 960, H = 260, padL = 40, padR = 16, padT = 12, padB = 28;
  const maxV = Math.max(4, total);
  const x = g => padL + (g - 1) / Math.max(1, pts.length - 1) * (W - padL - padR);
  const y = v => H - padB - v / maxV * (H - padT - padB);

  const yTicks = [];
  const step = maxV <= 10 ? 2 : maxV <= 30 ? 5 : maxV <= 80 ? 10 : 25;
  for (let v = 0; v <= maxV; v += step) yTicks.push(v);

  const path = pts.map((p, i) => `${i ? "L" : "M"}${x(p.g).toFixed(1)},${y(p.v).toFixed(1)}`).join("");
  const area = `${path}L${x(pts[pts.length - 1].g).toFixed(1)},${y(0)}L${x(1).toFixed(1)},${y(0)}Z`;
  const last = pts[pts.length - 1];

  box.innerHTML = `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="${esc(unitJa)}の累計推移">
    ${yTicks.map(v => `<line x1="${padL}" y1="${y(v)}" x2="${W - padR}" y2="${y(v)}" stroke="var(--grid)" stroke-width="1"/>
      <text x="${padL - 8}" y="${y(v) + 4}" text-anchor="end" font-size="11" fill="var(--text-muted)" font-variant-numeric="tabular-nums">${v}</text>`).join("")}
    <line x1="${padL}" y1="${y(0)}" x2="${W - padR}" y2="${y(0)}" stroke="var(--baseline)" stroke-width="1"/>
    <path d="${area}" fill="var(--series-1-wash)"/>
    <path d="${path}" fill="none" stroke="var(--series-1)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${x(last.g)}" cy="${y(last.v)}" r="4" fill="var(--series-1)" stroke="var(--surface-1)" stroke-width="2"/>
    <text x="${Math.min(x(last.g) + 8, W - 60)}" y="${Math.max(y(last.v) - 8, 12)}" font-size="12" font-weight="600" fill="var(--text-primary)">${last.v}${esc(unitJa)}</text>
    <text x="${padL}" y="${H - 8}" font-size="11" fill="var(--text-muted)">開幕</text>
    <text x="${W - padR}" y="${H - 8}" text-anchor="end" font-size="11" fill="var(--text-muted)">${pts.length}試合目</text>
    <line id="xhair" x1="0" y1="${padT}" x2="0" y2="${y(0)}" stroke="var(--baseline)" stroke-width="1" visibility="hidden"/>
    <circle id="xdot" r="4" fill="var(--series-1)" stroke="var(--surface-1)" stroke-width="2" visibility="hidden"/>
    <rect x="${padL}" y="${padT}" width="${W - padL - padR}" height="${H - padT - padB}" fill="transparent" id="hitArea"/>
  </svg><div class="tooltip" id="hrTip"></div>`;

  const svg = box.querySelector("svg");
  const tip = $("hrTip"), xhair = box.querySelector("#xhair"), xdot = box.querySelector("#xdot");
  const hitArea = box.querySelector("#hitArea");
  hitArea.addEventListener("mousemove", ev => {
    const rect = svg.getBoundingClientRect();
    const sx = (ev.clientX - rect.left) * (W / rect.width);
    const g = Math.round((sx - padL) / (W - padL - padR) * (pts.length - 1)) + 1;
    const p = pts[Math.min(Math.max(g, 1), pts.length) - 1];
    xhair.setAttribute("x1", x(p.g)); xhair.setAttribute("x2", x(p.g));
    xhair.setAttribute("visibility", "visible");
    xdot.setAttribute("cx", x(p.g)); xdot.setAttribute("cy", y(p.v));
    xdot.setAttribute("visibility", "visible");
    tip.style.display = "block";
    tip.innerHTML = `${esc(shortDate(p.date))} ・ ${p.g}試合目<br><b>累計 ${p.v} ${esc(unitJa)}</b>`;
    const bx = box.getBoundingClientRect();
    let left = ev.clientX - bx.left + 14;
    if (left + tip.offsetWidth > bx.width - 8) left = ev.clientX - bx.left - tip.offsetWidth - 14;
    tip.style.left = left + "px";
    tip.style.top = (ev.clientY - bx.top - 10) + "px";
  });
  hitArea.addEventListener("mouseleave", () => {
    tip.style.display = "none";
    xhair.setAttribute("visibility", "hidden");
    xdot.setAttribute("visibility", "hidden");
  });
}

// --- 試合中の打撃(リアルタイム) ---
const LIVE_POLL_MS = 25_000;
let liveTimer = null;
let currentTeamId = null;
let inGameLoading = false;

const EVENT_JA = {
  "Single": "安打", "Double": "二塁打", "Triple": "三塁打", "Home Run": "本塁打",
  "Strikeout": "三振", "Strikeout Double Play": "三振", "Walk": "四球", "Intent Walk": "敬遠",
  "Hit By Pitch": "死球", "Groundout": "ゴロ", "Bunt Groundout": "犠打", "Flyout": "飛球",
  "Lineout": "ライナー", "Pop Out": "飛球", "Forceout": "封殺", "Fielders Choice": "野選",
  "Fielders Choice Out": "野選", "Grounded Into DP": "併殺", "Double Play": "併殺",
  "Field Error": "失策", "Sac Fly": "犠飛", "Sac Bunt": "犠打", "Catcher Interference": "打撃妨害",
};
const eventJa = ev => EVENT_JA[ev] ?? ev;
const paClass = ev => {
  if (/Home Run/i.test(ev)) return "pa hr";
  if (/^(Single|Double|Triple)$/i.test(ev)) return "pa hit";
  if (/Walk|Hit By Pitch/i.test(ev)) return "pa walk";
  return "pa out";
};
const halfJa = h => (String(h).toLowerCase().startsWith("top") ? "表" : "裏");

function findBoxPlayer(box) {
  for (const side of ["away", "home"]) {
    const players = box.teams?.[side]?.players ?? {};
    const p = players[`ID${PLAYER_ID}`] ?? Object.values(players).find(x => x.person?.id === PLAYER_ID);
    if (p) return p;
  }
  return null;
}

// その試合の打撃セクション(ライン + 打席ごとの結果)
function battingSectionHtml(bat, pbp, isLive) {
  if (!bat || bat.plateAppearances == null || bat.plateAppearances === 0) {
    return isLive ? `<div class="line">この試合(打撃) まだ打席なし</div>` : "";
  }
  const bits = [];
  if (bat.homeRuns) bits.push(`本塁打${bat.homeRuns}`);
  if (bat.rbi) bits.push(`${bat.rbi}打点`);
  if (bat.runs) bits.push(`${bat.runs}得点`);
  if (bat.doubles) bits.push(`二塁打${bat.doubles}`);
  if (bat.triples) bits.push(`三塁打${bat.triples}`);
  if (bat.baseOnBalls) bits.push(`四球${bat.baseOnBalls}`);
  if (bat.strikeOuts) bits.push(`三振${bat.strikeOuts}`);
  if (bat.stolenBases) bits.push(`盗塁${bat.stolenBases}`);

  let pas = "";
  if (pbp?.allPlays) {
    pas = pbp.allPlays
      .filter(p => p.matchup?.batter?.id === PLAYER_ID && p.about?.isComplete)
      .map(p => {
        const inn = `${p.about.inning}回${halfJa(p.about.halfInning)}`;
        const ev = p.result?.event ?? "";
        const rbiTxt = p.result?.rbi ? ` +${p.result.rbi}` : "";
        return `<span class="${paClass(ev)}"><span class="inn">${esc(inn)}</span>${esc(eventJa(ev))}${rbiTxt}</span>`;
      }).join("");
    if (isLive) {
      const cur = pbp.allPlays.find(p => !p.about?.isComplete);
      if (cur && cur.matchup?.batter?.id === PLAYER_ID) {
        const c = cur.count ?? {};
        const inn = `${cur.about?.inning ?? ""}回${halfJa(cur.about?.halfInning)}`;
        pas += `<span class="pa now"><span class="inn">${esc(inn)}</span>打席中 ${c.balls ?? 0}-${c.strikes ?? 0}</span>`;
      }
    }
  }
  return `<div class="line">この試合(打撃) <span>${bat.hits}-${bat.atBats}</span>` +
    `${bits.length ? `<span class="sum">${esc(bits.join(" ・ "))}</span>` : ""}</div>` +
    `${pas ? `<div class="pas">${pas}</div>` : ""}`;
}

// その試合の投球セクション
function pitchingSectionHtml(pit) {
  if (!pit || pit.inningsPitched == null || ipToOuts(pit.inningsPitched) === 0) return "";
  const bits = [];
  bits.push(`${pit.strikeOuts ?? 0}奪三振`);
  bits.push(`${pit.baseOnBalls ?? 0}四球`);
  bits.push(`被安打${pit.hits ?? 0}`);
  if (pit.homeRuns) bits.push(`被弾${pit.homeRuns}`);
  const pitches = pit.numberOfPitches ?? pit.pitchesThrown;
  if (pitches) bits.push(`${pitches}球`);
  return `<div class="line">この試合(投球) <span>${esc(pit.inningsPitched)}回 ${pit.earnedRuns ?? 0}自責(${pit.runs ?? 0}失点)</span>` +
    `<span class="sum">${esc(bits.join(" ・ "))}</span></div>`;
}

async function loadInGameStats(gamePk, isLive) {
  if (!gamePk || inGameLoading) return;
  inGameLoading = true;
  try {
    const wantPBP = currentRole !== "pit"; // 打者は打席結果のためPBPが必要
    const [box, pbp] = await Promise.all([
      fetchJSON(`${API}/game/${gamePk}/boxscore`),
      wantPBP ? fetchJSON(`${API}/game/${gamePk}/playByPlay`).catch(() => null) : Promise.resolve(null),
    ]);
    const p = findBoxPlayer(box);
    const bat = p?.stats?.batting;
    const pit = p?.stats?.pitching;

    let html = "";
    if (currentRole !== "pit") html += battingSectionHtml(bat, pbp, isLive);
    if (currentRole === "pit" || currentRole === "two") html += pitchingSectionHtml(pit);

    if (!html) { $("gameHitting").hidden = true; return; }
    $("gameHitting").innerHTML = html;
    $("gameHitting").hidden = false;
  } catch (e) {
    console.error("in-game stats:", e);
    $("gameHitting").hidden = true;
  } finally {
    inGameLoading = false;
  }
}

function renderGameBanner(games) {
  if (!games.length) { $("gameCard").hidden = true; return; }
  const live = games.find(g => g.status?.abstractGameState === "Live");
  const game = live
    ?? [...games].reverse().find(g => g.status?.abstractGameState === "Final")
    ?? games[0];

  const away = game.teams.away, home = game.teams.home;
  const state = game.status?.abstractGameState;
  let badge;
  if (state === "Live") {
    const ls = game.linescore;
    const half = ls?.inningHalf === "Top" ? "表" : ls?.inningHalf === "Bottom" ? "裏" : "";
    badge = `<span class="badge live">● LIVE ${ls?.currentInning ?? ""}回${half}</span>`;
  } else if (state === "Final") {
    badge = `<span class="badge">試合終了</span>`;
  } else {
    const t = new Date(game.gameDate);
    badge = `<span class="badge">予定 ${t.toLocaleString("ja-JP", { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" })}</span>`;
  }
  const score = state === "Preview"
    ? `<span class="score">–</span>`
    : `<span class="score">${away.score ?? 0} - ${home.score ?? 0}</span>`;
  $("gameBody").innerHTML = `${badge}
    <span class="teams">${esc(away.team?.abbreviation ?? away.team?.name)} @ ${esc(home.team?.abbreviation ?? home.team?.name)}</span>
    ${score}`;
  $("gameCard").hidden = false;

  // その試合の成績(ライブ・終了とも表示。試合前は非表示)
  const isLive = state === "Live";
  if (state === "Preview") {
    $("gameHitting").hidden = true;
  } else {
    loadInGameStats(game.gamePk, isLive);
  }

  // ライブ中は高速ポーリング、それ以外は停止(冪等)
  if (isLive) {
    if (!liveTimer) liveTimer = setInterval(liveTick, LIVE_POLL_MS);
  } else if (liveTimer) {
    clearInterval(liveTimer);
    liveTimer = null;
  }
}

// --- タブ(選手切り替え) ---
function renderTabs() {
  $("tabs").innerHTML = PLAYERS.map(p =>
    `<button class="tab${p.id === PLAYER_ID ? " active" : ""}" data-id="${p.id}">${esc(p.jp ?? p.en)}</button>`
  ).join("");
  const active = $("tabs").querySelector(".tab.active");
  if (active) active.scrollIntoView({ inline: "center", block: "nearest" });
}

function resetView() {
  $("playerName").textContent = activePlayer.jp ?? activePlayer.en;
  $("playerMeta").textContent = "";
  $("gameCard").hidden = true;
  $("gameHitting").hidden = true;
  $("standCard").hidden = true;
  $("hitCard").hidden = false; $("pitCard").hidden = false;
  $("hitLogCard").hidden = false; $("pitLogCard").hidden = false;
  $("hitHero").innerHTML = ""; $("hitTiles").innerHTML = `<span class="loading">読み込み中…</span>`;
  $("pitHero").innerHTML = ""; $("pitTiles").innerHTML = `<span class="loading">読み込み中…</span>`;
  $("cumChart").innerHTML = `<span class="loading">読み込み中…</span>`;
  $("hitLog").innerHTML = `<span class="loading">読み込み中…</span>`;
  $("pitLog").innerHTML = `<span class="loading">読み込み中…</span>`;
  $("stamp").textContent = "読み込み中…";
}

function switchPlayer(id) {
  const pl = PLAYERS.find(p => p.id === id);
  if (!pl || id === PLAYER_ID) return;
  activePlayer = pl;
  PLAYER_ID = id;
  if (liveTimer) { clearInterval(liveTimer); liveTimer = null; }
  try { history.replaceState(null, "", `#${id}`); } catch {}
  renderTabs();
  resetView();
  window.scrollTo({ top: 0 });
  refresh();
}

// --- orchestration ---
let refreshing = false;
async function refresh() {
  if (refreshing) return;
  refreshing = true;
  $("refreshBtn").disabled = true;
  const reqId = PLAYER_ID; // 更新中にタブが切り替わったら結果を破棄
  try {
    const { season, person } = await resolveSeasonData();
    if (reqId !== PLAYER_ID) return;
    currentTeamId = person.currentTeam?.id ?? null;

    const pos = person.primaryPosition?.abbreviation ?? activePlayer.pos;
    const isPitcher = pos === "P";
    const isTwoWay = pos === "TWP";
    const showHit = !isPitcher;            // 二刀流・野手は打撃を表示
    const showPit = isPitcher || isTwoWay; // 投手・二刀流は投球を表示
    currentRole = isTwoWay ? "two" : isPitcher ? "pit" : "bat";

    $("playerName").textContent = activePlayer.jp ?? person.fullName;
    $("playerMeta").textContent =
      `${person.fullName} ・ ${person.currentTeam?.name ?? ""}${person.primaryNumber ? " ・ #" + person.primaryNumber : ""}`;

    await loadTeamAbbr(season);
    const leagueId = teamLeague?.[currentTeamId] ?? activePlayer.lg ?? 104;

    const [logs, games, standings, ranks] = await Promise.all([
      loadGameLogs(season),
      fetchScheduleGames(currentTeamId).catch(() => []),
      loadStandings(season).catch(() => []),
      loadRanks(season, leagueId).catch(() => ({ hit: {}, pit: {} })),
    ]);
    if (reqId !== PLAYER_ID) return;
    const timeByPk = new Map(games.map(g => [g.gamePk, Date.parse(g.gameDate)]));

    const hitStat = splitStat(person, "hitting");
    const pitStat = splitStat(person, "pitching");

    // 打撃カード
    if (showHit && hitStat) {
      $("hitCard").hidden = false;
      renderHitting(hitStat, season, computeHitDirs(hitStat, logs.hitting, timeByPk), ranks.hit);
    } else { $("hitCard").hidden = true; }

    // 投手カード
    if (showPit && pitStat) {
      $("pitCard").hidden = false;
      renderPitching(pitStat, season, computePitDirs(pitStat, logs.pitching, timeByPk), ranks.pit);
    } else { $("pitCard").hidden = true; }

    // 試合ログ
    $("hitLogCard").hidden = !(showHit && logs.hitting.length);
    if (showHit && logs.hitting.length) renderHitLog(logs.hitting);
    $("pitLogCard").hidden = !(showPit && logs.pitching.length);
    if (showPit && logs.pitching.length) renderPitLog(logs.pitching);

    // 累計チャート(投手=奪三振 / それ以外=本塁打)
    if (isPitcher) {
      $("chartTitle").innerHTML = `奪三振数の推移(累計)<span class="en">CUMULATIVE K</span>`;
      renderCumChart(logs.pitching, "strikeOuts", "奪三振");
    } else {
      $("chartTitle").innerHTML = `本塁打数の推移(累計)<span class="en">CUMULATIVE HR</span>`;
      renderCumChart(logs.hitting, "homeRuns", "本");
    }

    renderGameBanner(games);
    renderStandings(standings, currentTeamId);

    $("stamp").textContent = `最終更新 ${new Date().toLocaleTimeString("ja-JP")}`;
  } catch (err) {
    console.error(err);
    $("stamp").innerHTML = `<span class="error">更新に失敗しました(${esc(err.message)})。次回の自動更新で再試行します。</span>`;
  } finally {
    refreshing = false;
    $("refreshBtn").disabled = false;
  }
}

// 初期化: URLハッシュで選手を指定可能(例: #808967)
const hashId = Number(location.hash.replace("#", ""));
if (PLAYERS.some(p => p.id === hashId)) {
  activePlayer = PLAYERS.find(p => p.id === hashId);
  PLAYER_ID = hashId;
}
$("tabs").addEventListener("click", e => {
  const b = e.target.closest(".tab");
  if (b) switchPlayer(Number(b.dataset.id));
});
$("refreshBtn").addEventListener("click", refresh);
renderTabs();
resetView();
refresh();
setInterval(refresh, REFRESH_MS);
</script>
</body>
</html>
